<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הבית הצהוב – פאנל ניהול</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:     #FFD700;
      --yellow-dark:#E6C200;
      --blue:       #003DA5;
      --blue-dark:  #002a75;
      --blue-mid:   #1a56c4;
      --white:      #FFFFFF;
      --bg:         #F0F3FA;
      --gray:       #888;
      --green:      #16a34a;
      --green-bg:   #dcfce7;
      --orange:     #d97706;
      --orange-bg:  #fef3c7;
      --radius:     16px;
      --shadow:     0 4px 24px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: #1a1a1a;
      min-height: 100dvh;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      font-size: 17px;
      font-weight: 800;
    }

    .topbar-logo .yellow { color: var(--yellow); }

    .topbar-badge {
      background: rgba(255,215,0,.15);
      border: 1px solid rgba(255,215,0,.4);
      color: var(--yellow);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── PAGE ── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 16px 60px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--blue-dark);
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 14px;
      color: var(--gray);
      margin-bottom: 28px;
    }

    /* ── SUMMARY ROW ── */
    .summary-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      border-radius: 12px;
      padding: 10px 16px;
      box-shadow: var(--shadow);
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      flex: 1;
      min-width: 140px;
    }

    .summary-item .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .summary-item .dot.orange { background: var(--orange); }
    .summary-item .dot.green  { background: var(--green); }
    .summary-item .dot.blue   { background: var(--blue); }

    .summary-item strong { color: var(--blue-dark); }

    /* ── SECTION HEADER ── */
    .section-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.2px;
      color: var(--gray);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ── NAV CARDS ── */
    .nav-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .nav-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border: 2px solid transparent;
      transition: border-color .2s, transform .15s, box-shadow .2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .nav-card:hover {
      border-color: var(--blue);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,61,165,.12);
    }

    .nav-card::after {
      content: '←';
      position: absolute;
      left: 24px;
      bottom: 28px;
      font-size: 20px;
      color: var(--blue);
      opacity: 0;
      transition: opacity .2s, transform .2s;
      transform: translateX(6px);
    }

    .nav-card:hover::after {
      opacity: 1;
      transform: translateX(0);
    }

    .nav-card-icon {
      font-size: 36px;
      line-height: 1;
    }

    .nav-card-title {
      font-size: 20px;
      font-weight: 900;
      color: var(--blue-dark);
    }

    .nav-card-sub {
      font-size: 13px;
      color: var(--gray);
      line-height: 1.5;
    }

    .nav-card-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid #f1f5f9;
    }

    .badge {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 10px;
    }

    .badge.pending  { background: var(--orange-bg); color: var(--orange); }
    .badge.approved { background: var(--green-bg);  color: var(--green); }
    .badge.total    { background: #EEF3FF; color: var(--blue); }

    @media (max-width: 520px) {
      .nav-cards { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .stat-card .num { font-size: 28px; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">
    <svg width="26" height="26" viewBox="0 0 104 118" fill="none">
      <g style="fill:#FFD700;">
        <g transform="matrix(1.25,0,0,1.25,0,30.09)"><path d="M0,0 26,0 13,22.9z"/></g>
        <g transform="matrix(1.25,0,0,1.25,0.42,30.09)"><path d="M27.4,0 16.4,19.1 32.4,19.1 32.4,31.9 8.7,31.9 0,46.6 41.8,46.6 41.8,31.9 40.4,31.9 40.4,19.1z"/></g>
        <g transform="matrix(1.25,0,0,1.25,24.2,58.2)"><path d="M3.8,0A3.8,3.8,0,1,1,0,3.8A3.8,3.8,0,0,1,3.8,0z"/></g>
        <g transform="matrix(1.25,0,0,1.25,34.4,57.3)"><path d="M0.2,25.8 13.6,48.8 26.9,25.8 26.9,0 21.9,0 21.9,25.8z"/></g>
        <g transform="matrix(1.25,0,0,1.25,36.9,30)"><path d="M0.2,0 13.8,20 13.8,46.6 18.9,40.1 18.9,21 29.2,21 29.2,32.1 25.9,32.1 25.9,46.6 52.7,46.6 39.8,23.5 53.9,0 26.9,0 16,14 5.9,0z"/></g>
        <g transform="matrix(1.25,0,0,1.25,35.2,0)"><path d="M0,23.4 13.2,0 26.9,23.4 17.4,35.9 8.4,23.4z"/></g>
      </g>
    </svg>
    <span>הבית <span class="yellow">הצהוב</span></span>
  </div>
  <div class="topbar-badge">🔐 פאנל ניהול</div>
</header>

<div class="page">

  <div class="page-title">שלום, מנהל 👋</div>
  <div class="page-sub" id="dateStr"></div>

  <div class="section-label">ניהול</div>

  <div class="nav-cards">

    <!-- MEMBERS -->
    <a class="nav-card" href="admin-members.html">
      <div class="nav-card-icon">👥</div>
      <div>
        <div class="nav-card-title">חברים</div>
        <div class="nav-card-sub">אישור בקשות הצטרפות, צפייה בפרטי חברים ושליחת הודעות</div>
      </div>
      <div class="nav-card-badges">
        <span class="badge total"   id="m-total">0 נרשמו</span>
        <span class="badge pending" id="m-pending">0 ממתינים</span>
      </div>
    </a>

    <!-- BUSINESSES -->
    <a class="nav-card" href="admin-businesses.html">
      <div class="nav-card-icon">🏪</div>
      <div>
        <div class="nav-card-title">עסקים</div>
        <div class="nav-card-sub">אישור עסקים לאינדקס, צפייה בפרטים ויצירת קשר עם בעלי עסקים</div>
      </div>
      <div class="nav-card-badges">
        <span class="badge total"   id="b-total">0 נרשמו</span>
        <span class="badge pending" id="b-pending">0 ממתינים</span>
      </div>
    </a>

  </div>

</div>

<script>
  document.getElementById('dateStr').textContent =
    new Date().toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // mock stats — יוחלף ב-Firebase
  const members    = { total: 4, pending: 3, approved: 1 };
  const businesses = { total: 3, pending: 2, approved: 1 };

  document.getElementById('m-total').textContent   = members.total + ' נרשמו';
  document.getElementById('m-pending').textContent = members.pending + ' ממתינים';

  document.getElementById('b-total').textContent   = businesses.total + ' נרשמו';
  document.getElementById('b-pending').textContent = businesses.pending + ' ממתינים';
  document.getElementById('b-approved').textContent = businesses.approved + ' מאושרים';
</script>
