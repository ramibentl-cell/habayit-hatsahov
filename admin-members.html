<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הבית הצהוב – ניהול חברים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,61,165,.2); border-radius: 10px; }

    :root {
      --yellow:     #FFD700;
      --blue:       #003DA5;
      --blue-dark:  #002a75;
      --blue-mid:   #1a56c4;
      --white:      #FFFFFF;
      --bg:         #F0F3FA;
      --gray:       #888;
      --green:      #16a34a;
      --green-bg:   #dcfce7;
      --orange:     #d97706;
      --orange-bg:  #fef3c7;
      --slate:      #64748b;
      --slate-bg:   #f1f5f9;
      --radius:     14px;
      --shadow:     0 4px 20px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: #1a1a1a;
      min-height: 100dvh;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,.75);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }

    .back-btn:hover { background: rgba(255,255,255,.12); color: var(--white); }

    .topbar-title {
      flex: 1;
      color: var(--white);
      font-size: 17px;
      font-weight: 800;
    }

    .topbar-title span { color: var(--yellow); }

    /* ── LAYOUT ── */
    .page { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 18px 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .stat-card .num { font-size: 32px; font-weight: 900; color: var(--blue); line-height: 1; }
    .stat-card .lbl { font-size: 12px; color: var(--gray); margin-top: 4px; }
    .stat-card.pending  .num { color: var(--orange); }
    .stat-card.approved .num { color: var(--green); }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 2px solid #e2e8f0;
      background: var(--white);
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray);
      cursor: pointer;
      transition: all .15s;
    }

    .filter-btn.active { background: var(--blue); border-color: var(--blue); color: var(--white); }

    .search-box {
      flex: 1;
      min-width: 160px;
      padding: 7px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      outline: none;
      background: var(--white);
    }

    .search-box:focus { border-color: var(--blue); }

    /* ── MEMBER CARD ── */
    .member-card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 6px;
      overflow: hidden;
      border-right: 4px solid transparent;
      transition: border-color .2s;
    }

    .member-card.pending  { border-right-color: var(--orange); }
    .member-card.approved { border-right-color: var(--green); }
    .member-card.rejected { border-right-color: #cbd5e1; opacity: .6; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
    }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--blue-mid));
      color: var(--yellow);
      font-size: 13px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; }

    .card-name { font-size: 14px; font-weight: 700; white-space: nowrap; }

    .card-meta {
      font-size: 12px;
      color: var(--gray);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .chip.fresh    { background: #dcfce7; color: #15803d; }
    .chip.medium   { background: var(--orange-bg); color: var(--orange); }
    .chip.long     { background: #fee2e2; color: #b45309; }
    .chip.approved { background: var(--green-bg); color: var(--green); }
    .chip.rejected { background: var(--slate-bg); color: var(--slate); }

    .chevron { color: #cbd5e1; font-size: 16px; transition: transform .2s; flex-shrink: 0; }

    /* ── CARD BODY ── */
    .card-body { display: none; padding: 0 18px 18px; border-top: 1px solid #f1f5f9; }
    .card-body.open { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin: 16px 0;
    }

    .detail-item .lbl { font-size: 11px; color: var(--gray); font-weight: 500; margin-bottom: 2px; }
    .detail-item .val { font-size: 14px; font-weight: 600; word-break: break-all; }
    .detail-item.full { grid-column: 1 / -1; }

    .ver-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 8px;
    }

    .ver-tag.subscriber { background: #dbeafe; color: #1d4ed8; }
    .ver-tag.past       { background: #fef9c3; color: #854d0e; }
    .ver-tag.photo      { background: #f0fdf4; color: #15803d; }

    /* ── INLINE VER PILL ── */
    .ver-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ver-pill.sub  { background: #dbeafe; color: #1d4ed8; }
    .ver-pill.past { background: #fef9c3; color: #854d0e; }
    .ver-pill.photo{ background: #f0fdf4; color: #15803d; }

    /* ── ACTIONS ── */
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
      flex: 1;
      min-width: 100px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:active { transform: scale(.97); }

    .btn-approve { background: linear-gradient(135deg, #16a34a, #15803d); color: var(--white); box-shadow: 0 4px 12px rgba(22,163,74,.3); }
    .btn-reject  { background: var(--slate-bg); color: var(--slate); }
    .btn-wa      { background: linear-gradient(135deg, #25D366, #128C7E); color: var(--white); box-shadow: 0 4px 12px rgba(37,211,102,.3); }
    .btn-mail    { background: linear-gradient(135deg, var(--blue), var(--blue-mid)); color: var(--white); box-shadow: 0 4px 12px rgba(0,61,165,.25); }
    .btn-undo    { background: var(--slate-bg); color: var(--slate); font-size: 12px; flex: none; min-width: auto; padding: 8px 12px; }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--gray); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 520px;
      animation: slideUp .3s ease;
    }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal h3 { font-size: 20px; font-weight: 800; color: var(--blue); margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--gray); margin-bottom: 20px; }
    .modal-label { font-size: 12px; font-weight: 700; color: var(--blue); margin-bottom: 6px; margin-top: 14px; }

    .msg-preview {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.75;
      color: #374151;
      white-space: pre-wrap;
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: var(--white);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      transition: transform .3s cubic-bezier(.17,.67,.46,1.3);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <a class="back-btn" href="admin.html">› חזרה</a>
  <div class="topbar-title">👥 ניהול <span>חברים</span></div>
</header>

<div class="page">

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="lbl">סה"כ נרשמו</div>
    </div>
    <div class="stat-card pending">
      <div class="num" id="statPending">0</div>
      <div class="lbl">ממתינים לאישור</div>
    </div>
    <div class="stat-card approved">
      <div class="num" id="statApproved">0</div>
      <div class="lbl">חברים מאושרים</div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-val="all">הכל</button>
    <button class="filter-btn" data-val="pending">ממתינים</button>
    <button class="filter-btn" data-val="approved">מאושרים</button>
    <button class="filter-btn" data-val="rejected">נדחו</button>
    <input class="search-box" type="search" id="searchInput" placeholder="🔍  חיפוש שם / טלפון..." />
  </div>

  <div id="memberList"></div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="approveModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>✅ אישור חבר</h3>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-label">הודעת WhatsApp</div>
    <div class="msg-preview" id="waPreview"></div>
    <div class="modal-label">תוכן המייל</div>
    <div class="msg-preview" id="mailPreview"></div>
    <div class="modal-actions">
      <button class="btn btn-approve" id="confirmBtn" style="flex:2">שלח ואשר ✓</button>
      <button class="btn btn-reject" onclick="closeModal()" style="flex:1">ביטול</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const now = new Date();
const h   = n => new Date(now - n * 3600000).toISOString().slice(0,16).replace('T',' ');

let members = [
  { id:1, status:'pending',  firstName:'יוסי',  lastName:'כהן',    phone:'052-1234567', email:'yossi@gmail.com',  isSubscriber:'yes', subscriberSection:'8',  subscriberNumber:'4521', registeredAt:h(2)  },
  { id:2, status:'pending',  firstName:'מיכל',  lastName:'לוי',    phone:'054-9876543', email:'michal@gmail.com', isSubscriber:'no',  wasSubscriber:'yes', facebook:'https://facebook.com/michal.levi', registeredAt:h(18) },
  { id:3, status:'approved', firstName:'דני',   lastName:'אברהם',  phone:'050-3334444', email:'danny@walla.com',  isSubscriber:'yes', subscriberSection:'11', subscriberNumber:'7890', registeredAt:h(50), approvedAt:h(48) },
  { id:4, status:'pending',  firstName:'רון',   lastName:'שפירא',  phone:'058-5556666', email:'ron@gmail.com',    isSubscriber:'no',  wasSubscriber:'no',  facebook:'https://facebook.com/ron.shapira', registeredAt:h(36) }
];

let activeFilter  = 'all';
let pendingId     = null;

// ── helpers ──────────────────────────────────────────────────────────────────
function nowStr() {
  return new Date().toLocaleDateString('he-IL') + ' ' +
         new Date().toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
}

function timeAgo(s) {
  const m = Math.floor((Date.now() - new Date(s.replace(' ','T'))) / 60000);
  if (m < 60)   return m + ' דק\'';
  if (m < 1440) return Math.floor(m/60) + ' שע\'';
  return Math.floor(m/1440) + ' ימים';
}

function waitingChip(s) {
  const h = (Date.now() - new Date(s.replace(' ','T'))) / 3600000;
  const [cls, icon] = h < 6 ? ['fresh','🟢'] : h < 24 ? ['medium','🟠'] : ['long','🔴'];
  return `<span class="chip ${cls}">${icon} ממתין ${timeAgo(s)}</span>`;
}

function statusChip(m) {
  if (m.status === 'approved') return `<span class="chip approved">✓ אושר ב־${m.approvedAt}</span>`;
  if (m.status === 'rejected') return `<span class="chip rejected">✗ נדחה${m.rejectedAt ? ' ב־' + m.rejectedAt : ''}</span>`;
  return waitingChip(m.registeredAt);
}

function verTag(m) {
  if (m.isSubscriber === 'yes')
    return `<span class="ver-tag subscriber">מנוי שער ${m.subscriberSection} · #${m.subscriberNumber}</span>`;
  if (m.wasSubscriber === 'yes')
    return `<span class="ver-tag past">מנוי לשעבר · יש תמונה</span>`;
  return `<span class="ver-tag photo">לא מנוי · יש תמונה ופייסבוק</span>`;
}

function verInline(m) {
  return m.isSubscriber === 'yes'
    ? `<span class="ver-pill sub">מנוי</span>`
    : `<span class="ver-pill photo">לא מנוי</span>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const open = body.classList.toggle('open');
  chev.style.transform = open ? 'rotate(90deg)' : '';
}

// ── stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statTotal').textContent   = members.length;
  document.getElementById('statPending').textContent  = members.filter(m => m.status === 'pending').length;
  document.getElementById('statApproved').textContent = members.filter(m => m.status === 'approved').length;
}

// ── render ────────────────────────────────────────────────────────────────────
function render() {
  const search   = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = members.filter(m => {
    const matchF = activeFilter === 'all' || m.status === activeFilter;
    const matchS = !search ||
      (m.firstName + ' ' + m.lastName).toLowerCase().includes(search) ||
      m.phone.includes(search);
    return matchF && matchS;
  });

  updateStats();

  const list = document.getElementById('memberList');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>לא נמצאו תוצאות</p></div>`;
    return;
  }

  const statusLabel = { pending:'ממתין', approved:'מאושר ✓', rejected:'נדחה' };

  list.innerHTML = filtered.map(m => {
    const initials = m.firstName[0] + m.lastName[0];

    const actions = m.status === 'pending' ? `
      <div class="card-actions">
        <button class="btn btn-approve" onclick="openModal(${m.id})">✅ אשר חבר</button>
        <button class="btn btn-reject"  onclick="rejectMember(${m.id})">✗ דחה</button>
      </div>`
    : m.status === 'approved' ? `
      <div class="card-actions">
        <button class="btn btn-wa"   onclick="sendWA(${m.id})">📲 WhatsApp</button>
        <button class="btn btn-mail" onclick="sendMail(${m.id})">✉️ מייל</button>
        <button class="btn btn-undo" onclick="rejectMember(${m.id})">↩ בטל אישור</button>
      </div>`
    : `<div class="card-actions">
        <button class="btn btn-approve" onclick="openModal(${m.id})">↩ אשר בכל זאת</button>
      </div>`;

    return `
    <div class="member-card ${m.status}">
      <div class="card-header" onclick="toggleCard(${m.id})">
        <div class="avatar">${initials}</div>
        <div class="card-info">
          <div class="card-name">${m.firstName} ${m.lastName}</div>
          <div class="card-meta">${m.phone} · ${m.email}</div>
        </div>
        ${verInline(m)}
        ${statusChip(m)}
        <span class="chevron" id="chev-${m.id}">›</span>
      </div>
      <div class="card-body" id="body-${m.id}">
        <div class="detail-grid">
          <div class="detail-item">
            <div class="lbl">טלפון</div>
            <div class="val">${m.phone}</div>
          </div>
          <div class="detail-item">
            <div class="lbl">אימייל</div>
            <div class="val">${m.email}</div>
          </div>
          <div class="detail-item full">
            <div class="lbl">אימות אוהד</div>
            <div class="val">${verTag(m)}</div>
          </div>
          ${m.facebook ? `
          <div class="detail-item full">
            <div class="lbl">פייסבוק</div>
            <div class="val"><a href="${m.facebook}" target="_blank" style="color:var(--blue)">${m.facebook}</a></div>
          </div>` : ''}
        </div>
        ${actions}
      </div>
    </div>`;
  }).join('');
}

// ── filter ────────────────────────────────────────────────────────────────────
document.querySelector('.filter-bar').addEventListener('click', e => {
  const btn = e.target.closest('[data-val]');
  if (!btn) return;
  activeFilter = btn.dataset.val;
  document.querySelectorAll('[data-val]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('searchInput').addEventListener('input', render);

// ── modal ─────────────────────────────────────────────────────────────────────
function buildWA(m) {
  return `היי ${m.firstName} 👋\nברוך הבא לבית הצהוב! 💛\n\nהבקשה שלך אושרה.\n\n🔗 לינק כניסה לאתר: [יוכנס בהמשך]\n👥 קהילת הווטסאפ: [יוכנס בהמשך]\n🎟️ תעודת חבר דיגיטלית: [יצורף בהמשך]\n\nביחד ננצח 🏆`;
}

function buildMail(m) {
  return `שלום ${m.firstName},\n\nשמחים לבשר שהצטרפותך לבית הצהוב אושרה!\n\nמצורפים:\n• לינק כניסה אישי לאתר\n• לינק לקהילת הווטסאפ\n• תעודת חבר דיגיטלית\n\nבאהבה,\nצוות הבית הצהוב 💛`;
}

function openModal(id) {
  pendingId = id;
  const m = members.find(x => x.id === id);
  document.getElementById('modalSub').textContent   = `${m.firstName} ${m.lastName} · ${m.phone}`;
  document.getElementById('waPreview').textContent   = buildWA(m);
  document.getElementById('mailPreview').textContent = buildMail(m);
  document.getElementById('approveModal').classList.add('open');
}

function closeModal() {
  document.getElementById('approveModal').classList.remove('open');
  pendingId = null;
}

document.getElementById('confirmBtn').addEventListener('click', () => {
  const m      = members.find(x => x.id === pendingId);
  m.status     = 'approved';
  m.approvedAt = nowStr();
  delete m.rejectedAt;
  closeModal();
  sendWA(m.id);
  showToast(`✅ ${m.firstName} ${m.lastName} אושר/ה!`);
  render();
});

function rejectMember(id) {
  const m    = members.find(x => x.id === id);
  const name = `${m.firstName} ${m.lastName}`;
  if (m.status === 'approved') {
    if (!confirm(`לבטל אישור של ${name}?`)) return;
    m.status = 'pending';
    delete m.approvedAt;
    showToast(`↩ אישור בוטל — ${name} חזר/ה להמתנה`);
  } else {
    if (!confirm(`לדחות את ${name}?`)) return;
    m.status     = 'rejected';
    m.rejectedAt = nowStr();
    showToast('הבקשה נדחתה');
  }
  render();
}

function sendWA(id) {
  const m  = members.find(x => x.id === id);
  const ph = m.phone.replace(/\D/g,'');
  window.open(`https://wa.me/${ph.startsWith('0') ? '972'+ph.slice(1) : ph}?text=${encodeURIComponent(buildWA(m))}`, '_blank');
}

function sendMail(id) {
  const m = members.find(x => x.id === id);
  window.open(`mailto:${m.email}?subject=${encodeURIComponent('ברוך הבא לבית הצהוב 💛')}&body=${encodeURIComponent(buildMail(m))}`, '_blank');
}

// ── init ──────────────────────────────────────────────────────────────────────
render();
</script>
