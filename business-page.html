<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>הבית הצהוב – עסק</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow:  #FFD700;
      --yellow-dk:#E6C200;
      --blue:    #003DA5;
      --blue-dk: #002a75;
      --blue-md: #1a56c4;
      --white:   #FFFFFF;
      --bg:      #F5F6FA;
      --gray:    #888;
      --green:   #16a34a;
      --green-bg:#dcfce7;
      --orange:  #d97706;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Heebo', sans-serif; background: var(--bg); color: #1a1a1a; padding-bottom: 100px; }
    ::-webkit-scrollbar { width: 0; }

    /* ── HERO ── */
    .hero {
      height: 200px;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    .hero-logo-big {
      width: 90px; height: 90px;
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Heebo', sans-serif;
      font-size: 36px; font-weight: 900;
      color: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,.25);
    }

    /* ── TOP BAR ── */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 14px 16px;
      z-index: 10;
    }

    .back-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      text-decoration: none; color: var(--blue-dk);
      font-weight: 700;
    }

    .share-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }

    /* ── CONTENT ── */
    .content { padding: 0 16px; }

    .biz-header {
      background: var(--white);
      border-radius: 20px;
      padding: 20px 18px;
      margin-top: -30px;
      position: relative;
      z-index: 2;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }

    .biz-name { font-size: 22px; font-weight: 900; color: #1a1a1a; }

    .biz-meta {
      display: flex; align-items: center;
      gap: 14px; margin-top: 8px; flex-wrap: wrap;
    }

    .meta-tag {
      display: flex; align-items: center; gap: 4px;
      font-size: 13px; color: var(--gray);
    }

    .cat-badge {
      display: inline-block;
      background: #EEF3FF;
      color: var(--blue);
      font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }

    .online-badge {
      display: inline-block;
      background: var(--green-bg);
      color: var(--green);
      font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }

    /* ── SECTION ── */
    .section {
      background: var(--white);
      border-radius: 16px;
      padding: 18px;
      margin-top: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }

    .section-title {
      font-size: 14px; font-weight: 800;
      color: var(--blue); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }

    .desc-text {
      font-size: 14px; color: #555;
      line-height: 1.7;
    }

    /* ── BENEFIT BOX ── */
    .benefit-box {
      background: linear-gradient(135deg, #FFF8E1, #FFFDE7);
      border: 2px solid #FFE082;
      border-radius: 14px;
      padding: 16px;
      margin-top: 12px;
    }

    .benefit-title {
      font-size: 13px; font-weight: 800;
      color: var(--orange); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }

    .benefit-text {
      font-size: 16px; font-weight: 800;
      color: #1a1a1a;
    }

    .benefit-type {
      font-size: 12px; color: var(--gray);
      margin-top: 4px;
    }

    /* ── COUPON BOX ── */
    .coupon-section {
      margin-top: 14px;
    }

    .coupon-reveal-btn {
      width: 100%;
      background: var(--blue);
      color: var(--white);
      border: none; border-radius: 12px;
      padding: 14px;
      font-family: 'Heebo', sans-serif;
      font-size: 15px; font-weight: 800;
      cursor: pointer;
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      transition: transform .15s;
    }
    .coupon-reveal-btn:active { transform: scale(.98); }

    .coupon-box {
      display: none;
      background: var(--blue-dk);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      animation: popIn .3s cubic-bezier(.17,.67,.46,1.3);
    }

    @keyframes popIn { from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }

    .coupon-label {
      color: rgba(255,255,255,.6);
      font-size: 11px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 8px;
    }

    .coupon-code {
      color: var(--yellow);
      font-size: 28px; font-weight: 900;
      letter-spacing: 3px;
      font-family: monospace;
    }

    .coupon-copy-btn {
      margin-top: 10px;
      background: rgba(255,215,0,.15);
      border: 1px solid rgba(255,215,0,.3);
      color: var(--yellow);
      border-radius: 8px; padding: 8px 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
    }

    .coupon-copy-btn.copied {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green);
    }

    .physical-box {
      display: none;
      background: var(--blue-dk);
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      animation: popIn .3s cubic-bezier(.17,.67,.46,1.3);
    }

    .physical-box .icon { font-size: 36px; margin-bottom: 10px; }
    .physical-box h4 { color: var(--white); font-size: 16px; font-weight: 800; margin-bottom: 8px; }
    .physical-box p { color: rgba(255,255,255,.65); font-size: 13px; line-height: 1.7; }
    .physical-box .card-link {
      display: inline-block; margin-top: 14px;
      background: var(--yellow); color: var(--blue-dk);
      border-radius: 10px; padding: 10px 20px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px; font-weight: 800;
      text-decoration: none;
    }

    /* ── CLICKS COUNTER ── */
    .clicks-info {
      font-size: 12px; color: var(--gray);
      margin-top: 10px; text-align: center;
    }

    /* ── SOCIAL ── */
    .social-links {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-top: 4px;
    }

    .social-link {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border-radius: 8px;
      padding: 8px 12px; text-decoration: none;
      font-size: 13px; font-weight: 600; color: var(--blue);
      transition: background .15s;
    }
    .social-link:active { background: #e2e8f0; }

    /* ── BOTTOM CTA ── */
    .bottom-cta {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1px solid #E8EDF5;
      padding: 12px 16px 20px;
      display: flex; gap: 10px;
      box-shadow: 0 -4px 16px rgba(0,0,0,.08);
    }

    .cta-call {
      flex: 1;
      background: var(--bg);
      border: 2px solid #E8EDF5;
      border-radius: 12px; padding: 12px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--blue); cursor: pointer;
      display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }

    .cta-whatsapp {
      flex: 2;
      background: linear-gradient(135deg, #25D366, #128C7E);
      border: none; border-radius: 12px; padding: 12px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px; font-weight: 800;
      color: var(--white); cursor: pointer;
      display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero" id="heroSection">
  <div class="top-bar">
    <a href="/home.html" class="back-btn">‹</a>
    <div class="share-btn">⬆️</div>
  </div>
  <div class="hero-bg" id="heroBg">
    <div class="hero-logo-big" id="heroLogo"></div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- HEADER -->
  <div class="biz-header">
    <div class="biz-name" id="bizName">טוען...</div>
    <div class="biz-meta" id="bizMeta"></div>
  </div>

  <!-- DESCRIPTION -->
  <div class="section" id="descSection" style="display:none">
    <div class="section-title">📖 על העסק</div>
    <div class="desc-text" id="bizDesc"></div>
  </div>

  <!-- BENEFIT + REDEMPTION -->
  <div class="section" id="benefitSection" style="display:none">
    <div class="section-title">💛 הטבה לחברים</div>

    <div class="benefit-box">
      <div class="benefit-title">💛 ההטבה שלך</div>
      <div class="benefit-text" id="discountText"></div>
      <div class="benefit-type" id="discountType"></div>
    </div>

    <!-- COUPON / PHYSICAL REDEMPTION -->
    <div class="coupon-section" id="couponSection"></div>
    <div class="clicks-info" id="clicksInfo"></div>
  </div>

  <!-- SOCIAL -->
  <div class="section" id="socialSection" style="display:none">
    <div class="section-title">🔗 צור קשר</div>
    <div class="social-links" id="socialLinks"></div>
  </div>

</div>

<!-- BOTTOM CTA -->
<div class="bottom-cta" id="bottomCta" style="display:none">
  <button class="cta-call" id="callBtn">📞 התקשר</button>
  <button class="cta-whatsapp" id="waBtn">💬 WhatsApp</button>
</div>

<!-- DEV ONLY – למחיקה לפני העלאה -->
<a href="/" style="position:fixed;top:12px;left:8px;z-index:9999;background:#002a75;color:#FFD700;border:1.5px solid #FFD700;border-radius:20px;padding:6px 12px;font-family:'Heebo',sans-serif;font-size:11px;font-weight:700;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.3);white-space:nowrap;">← תפריט</a>

<script>
// ── SAME DATA AS home.html ─────────────────────────────────────────────────
const businesses = [
  {id:1,name:'מאפיית הצהוב',cat:'food',city:'תל אביב',desc:'מאפייה ביתית עם מוצרים טריים מדי בוקר. לחם, עוגות ומאפים מהמחלבה ישירות לשולחן שלך.',phone:'052-1111111',discount:'10% על כל קנייה',discountType:'physical',online:false,instagram:'maccabi_bakery',clicks:342},
  {id:2,name:'Studio D – עיצוב גרפי',cat:'tech',city:'רמת גן',desc:'עיצוב לוגו, ברנדינג ומדיה חברתית לעסקים קטנים. יצירתיות ומקצועיות בשירות האוהדים.',phone:'054-2222222',discount:'20% על פרויקט ראשון',discountType:'online',coupon:'MACCABI20',online:true,website:'www.studiod.co.il',instagram:'studio_d_design',clicks:218},
  {id:3,name:'שיפוצים ובנייה – משה',cat:'pro',city:'פתח תקווה',desc:'שיפוץ דירות, אינסטלציה וחשמל. זמינות מהירה, עבודה נקייה ומחירים הוגנים לאוהדים.',phone:'050-3333333',discount:'ייעוץ ראשוני חינם',discountType:'physical',online:false,clicks:189},
  {id:4,name:'פארם פלוס',cat:'health',city:'תל אביב',desc:'תוספי תזונה, ויטמינים ומוצרי בריאות איכותיים. ייעוץ אישי חינמי לכל חבר.',phone:'053-4444444',discount:'15% על תוספי תזונה',discountType:'physical',online:false,clicks:97},
  {id:5,name:'חנות הצהוב – מרצ\'נדייז',cat:'fashion',city:'אונליין',desc:'מרצ\'נדייז רשמי של אוהדי מכבי. חולצות, כובעים, צעיפים ועוד — כולם בצהוב וכחול.',phone:'',discount:'קנה 2 קבל 1',discountType:'online',coupon:'BUY2GET1',online:true,website:'www.yellow-store.co.il',instagram:'yellow_store_maccabi',clicks:276},
  {id:6,name:'יוסי ביטוח',cat:'finance',city:'חולון',desc:'פתרונות ביטוח מקיפים — רכב, דירה, חיים. ניסיון של 15 שנה, שירות אישי לכל אוהד.',phone:'052-6666666',discount:'פגישת ייעוץ חינם',discountType:'physical',online:false,clicks:54},
  {id:7,name:'עו"ד גיל לוי',cat:'legal',city:'תל אביב',desc:'עריכת דין בתחומי נדל"ן, חוזים ודיני עבודה. ליווי אישי ומקצועי לאוהדי מכבי.',phone:'054-7777777',discount:'שעת ייעוץ ראשונה ב-50%',discountType:'physical',online:false,clicks:41},
  {id:8,name:'קפה הבית – מכבי',cat:'food',city:'גבעתיים',desc:'בית קפה אוהד בלב גבעתיים. אווירה צהובה, קפה מעולה, ובכל משחק — מסך ענק.',phone:'03-8888888',discount:'קפה שני ב-1 ₪',discountType:'physical',online:false,clicks:401},
  {id:9,name:'TechFix – תיקון מכשירים',cat:'tech',city:'אונליין',desc:'תיקון סמארטפונים ומחשבים מכל הסוגים. שירות מהיר, אחריות 6 חודשים.',phone:'050-9999999',discount:'10% על כל תיקון',discountType:'online',coupon:'TECHFIX10',online:true,website:'www.techfix.co.il',clicks:113}
];

const catColors = {
  food:['#FF6B35','#E85D04'], pro:['#2563EB','#1D4ED8'],
  fashion:['#7C3AED','#6D28D9'], health:['#059669','#047857'],
  finance:['#0284C7','#0369A1'], tech:['#0891B2','#0E7490'],
  legal:['#64748B','#475569']
};

function initials(name) {
  const w = name.replace(/[–-]/g,' ').trim().split(/\s+/);
  return w.length===1 ? w[0].slice(0,2) : w[0][0]+w[1][0];
}

// ── GET BIZ FROM URL ──────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const bizId  = parseInt(params.get('id'));
const biz    = businesses.find(b => b.id === bizId) || businesses[0];

// ── TRACK CLICK ───────────────────────────────────────────────────────────────
const clickKey = '_hb_clicks_' + biz.id;
const clicks   = parseInt(localStorage.getItem(clickKey) || biz.clicks) + 1;
localStorage.setItem(clickKey, clicks);

// ── RENDER ────────────────────────────────────────────────────────────────────
const colors = catColors[biz.cat] || ['#003DA5','#002a75'];

// Hero
document.getElementById('heroBg').style.background =
  `linear-gradient(135deg, ${colors[0]}33, ${colors[1]}55)`;
const logo = document.getElementById('heroLogo');
logo.textContent = initials(biz.name);
logo.style.background = `linear-gradient(135deg,${colors[0]},${colors[1]})`;

// Name & meta
document.title = biz.name + ' – הבית הצהוב';
document.getElementById('bizName').textContent = biz.name;

const catLabels = {food:'אוכל ושתייה',pro:'בעלי מקצוע',fashion:'ביגוד ואופנה',health:'בריאות ויופי',finance:'פיננסים',tech:'טכנולוגיה',legal:'משפטים'};
const meta = document.getElementById('bizMeta');
meta.innerHTML = `
  <span class="cat-badge">${catLabels[biz.cat]||biz.cat}</span>
  ${biz.online ? '<span class="online-badge">🌐 אונליין</span>' : ''}
  <span class="meta-tag">📍 ${biz.city}</span>
  <span class="meta-tag">🔥 ${clicks} צפיות</span>`;

// Description
if (biz.desc) {
  document.getElementById('descSection').style.display = 'block';
  document.getElementById('bizDesc').textContent = biz.desc;
}

// Benefit
if (biz.discount) {
  document.getElementById('benefitSection').style.display = 'block';
  document.getElementById('discountText').textContent = biz.discount;
  document.getElementById('discountType').textContent =
    biz.discountType === 'online' ? '🌐 מימוש באתר האינטרנט' : '🏪 מימוש בחנות הפיזית';
  document.getElementById('clicksInfo').textContent =
    `${clicks} חברים צפו בהטבה זו`;

  const couponSection = document.getElementById('couponSection');

  if (biz.discountType === 'online' && biz.coupon) {
    couponSection.innerHTML = `
      <button class="coupon-reveal-btn" id="revealBtn" onclick="revealCoupon()">
        🎟️ לחץ לחשיפת קוד הקופון
      </button>
      <div class="coupon-box" id="couponBox">
        <div class="coupon-label">קוד הקופון שלך</div>
        <div class="coupon-code">${biz.coupon}</div>
        <button class="coupon-copy-btn" id="copyBtn" onclick="copyCoupon('${biz.coupon}')">
          📋 העתק קוד
        </button>
      </div>`;
  } else if (biz.discountType === 'physical') {
    couponSection.innerHTML = `
      <button class="coupon-reveal-btn" id="revealBtn" onclick="revealPhysical()">
        🏪 איך לממש בחנות?
      </button>
      <div class="physical-box" id="physicalBox">
        <div class="icon">🎟️</div>
        <h4>הצג את התעודה שלך</h4>
        <p>הצג את תעודת החבר הדיגיטלית שלך בחנות וקבל את ההטבה.<br/>ניתן לפתוח את התעודה מהפרופיל שלך.</p>
        <a href="/card.html" class="card-link">פתח תעודת חבר 🎟️</a>
      </div>`;
  }
}

// Social
const socialLinks = [];
if (biz.phone)     socialLinks.push(`<a class="social-link" href="tel:${biz.phone}">📞 ${biz.phone}</a>`);
if (biz.website)   socialLinks.push(`<a class="social-link" href="https://${biz.website}" target="_blank">🌐 אתר</a>`);
if (biz.instagram) socialLinks.push(`<a class="social-link" href="https://instagram.com/${biz.instagram}" target="_blank">📸 אינסטגרם</a>`);
if (socialLinks.length) {
  document.getElementById('socialSection').style.display = 'block';
  document.getElementById('socialLinks').innerHTML = socialLinks.join('');
}

// Bottom CTA
if (biz.phone) {
  document.getElementById('bottomCta').style.display = 'flex';
  document.getElementById('callBtn').onclick = () => location.href = 'tel:' + biz.phone;
  const ph = biz.phone.replace(/\D/g,'');
  const intl = ph.startsWith('0') ? '972'+ph.slice(1) : ph;
  document.getElementById('waBtn').onclick = () =>
    window.open(`https://wa.me/${intl}?text=${encodeURIComponent('היי, ראיתי את העסק שלך בהבית הצהוב 💛')}`, '_blank');
} else {
  document.getElementById('bottomCta').style.display = 'none';
}

// ── COUPON REVEAL ─────────────────────────────────────────────────────────────
function revealCoupon() {
  document.getElementById('revealBtn').style.display = 'none';
  document.getElementById('couponBox').style.display  = 'block';
}

function revealPhysical() {
  document.getElementById('revealBtn').style.display   = 'none';
  document.getElementById('physicalBox').style.display = 'block';
}

function copyCoupon(code) {
  navigator.clipboard?.writeText(code).catch(()=>{});
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ הועתק!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent='📋 העתק קוד'; btn.classList.remove('copied'); }, 2000);
}
</script>
</body>
</html>
