<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הבית הצהוב – תעודת חבר</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* no red anywhere */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,215,0,.3); border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    a { color: var(--yellow); }
    :root {
      --yellow:     #FFD700;
      --yellow-dark:#E6C200;
      --blue:       #003DA5;
      --blue-dark:  #002a75;
      --blue-mid:   #1a56c4;
      --white:      #FFFFFF;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(160deg, var(--blue-dark) 0%, var(--blue) 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 28px;
    }

    /* ── HEADER ── */
    .page-title {
      color: var(--yellow);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: .8;
    }

    /* ── CARD ── */
    .card-wrap {
      width: 100%;
      max-width: 420px;
      perspective: 1000px;
    }

    .card {
      width: 100%;
      aspect-ratio: 1.586; /* credit card ratio */
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 25px 60px rgba(0,0,0,.45),
        0 0 0 1px rgba(255,215,0,.2);
      background: linear-gradient(175deg, #001a4d 0%, #002a75 35%, #003DA5 65%, #0a3d8f 100%);
      animation: cardIn .6s cubic-bezier(.17,.67,.46,1.2) both;
    }

    @keyframes cardIn {
      from { transform: translateY(40px) rotateX(8deg); opacity: 0; }
      to   { transform: translateY(0)    rotateX(0deg); opacity: 1; }
    }

    /* shimmer overlay */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 40%,
        rgba(255,255,255,.06) 50%,
        transparent 60%
      );
      z-index: 1;
    }

    /* stadium lights */
    .card-light1, .card-light2 {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .card-light1 {
      width: 200px; height: 200px;
      top: -60px; right: -40px;
      background: radial-gradient(circle, rgba(255,230,100,.18) 0%, transparent 70%);
    }
    .card-light2 {
      width: 160px; height: 160px;
      top: -50px; left: 30px;
      background: radial-gradient(circle, rgba(255,230,100,.12) 0%, transparent 70%);
    }

    /* stripe top */
    .card-stripe {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--yellow-dark), var(--yellow), var(--yellow-dark));
    }

    /* CARD CONTENT */
    .card-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      padding: 18px 22px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* TOP ROW */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-logo-text {
      color: var(--white);
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -.3px;
      line-height: 1;
    }

    .card-logo-text span { color: var(--yellow); }

    .card-badge {
      background: rgba(255,215,0,.15);
      border: 1px solid rgba(255,215,0,.4);
      color: var(--yellow);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: .5px;
    }

    /* MIDDLE ROW */
    .card-mid {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .card-member-label {
      color: rgba(255,255,255,.45);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .card-member-name {
      color: var(--white);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -.3px;
      text-shadow: 0 2px 8px rgba(0,0,0,.3);
    }

    /* BOTTOM ROW */
    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .card-fields {
      display: flex;
      gap: 20px;
    }

    .card-field {}
    .card-field-label {
      color: rgba(255,255,255,.45);
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .card-field-value {
      color: var(--white);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .5px;
    }

    .card-field-value.yellow { color: var(--yellow); }

    /* CHIP */
    .card-chip {
      width: 36px; height: 27px;
      background: linear-gradient(135deg, var(--yellow-dark), var(--yellow));
      border-radius: 5px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }
    .card-chip::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 60%; height: 50%;
      transform: translate(-50%,-50%);
      border: 1.5px solid rgba(0,0,0,.25);
      border-radius: 2px;
    }
    .card-chip::after {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: rgba(0,0,0,.2);
    }

    /* ── SAVE BUTTON ── */
    .save-btn {
      width: 100%;
      max-width: 420px;
      background: var(--yellow);
      color: var(--blue-dark);
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 6px 20px rgba(255,215,0,.35);
      transition: transform .15s, box-shadow .15s;
    }
    .save-btn:active { transform: scale(.98); }

    /* ── INFO BOX ── */
    .info-box {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info-label {
      color: rgba(255,255,255,.5);
      font-size: 12px;
    }

    .info-value {
      color: var(--white);
      font-size: 13px;
      font-weight: 600;
    }

    .info-divider {
      height: 1px;
      background: rgba(255,255,255,.1);
    }

    /* ── FAMILY TAG ── */
    .family-tag {
      display: inline-block;
      background: rgba(255,215,0,.12);
      border: 1px solid rgba(255,215,0,.3);
      color: var(--yellow);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── FOOTER ── */
    .card-footer-note {
      color: rgba(255,255,255,.3);
      font-size: 11px;
      text-align: center;
    }
  </style>
</head>
<body>

  <p class="page-title">תעודת חבר דיגיטלית</p>

  <!-- ── THE CARD ── -->
  <div class="card-wrap">
    <div class="card" id="memberCard">
      <div class="card-stripe"></div>
      <div class="card-light1"></div>
      <div class="card-light2"></div>


      <div class="card-inner">

        <!-- TOP -->
        <div class="card-top">
          <div class="card-logo">
            <svg width="26" height="30" viewBox="0 0 104 118" fill="none">
              <g style="fill:#FFD700;">
                <g transform="matrix(1.25,0,0,1.25,0,30.09)"><path d="M0,0 26,0 13,22.9Z"/></g>
                <g transform="matrix(1.25,0,0,1.25,0.42,30.09)"><path d="M27.4,0 16.4,19.1 32.4,19.1 32.4,31.9 8.7,31.9 0,46.6 41.8,46.6 41.8,31.9 40.4,31.9 40.4,19.1Z"/></g>
                <g transform="matrix(1.25,0,0,1.25,24.2,58.2)"><path d="M3.8,0A3.8,3.8,0,1,1,0,3.8A3.8,3.8,0,0,1,3.8,0Z"/></g>
                <g transform="matrix(1.25,0,0,1.25,34.4,57.3)"><path d="M0.2,25.8 13.6,48.8 26.9,25.8 26.9,0 21.9,0 21.9,25.8Z"/></g>
                <g transform="matrix(1.25,0,0,1.25,36.9,30)"><path d="M0.2,0 13.8,20 13.8,46.6 18.9,40.1 18.9,21 29.2,21 29.2,32.1 25.9,32.1 25.9,46.6 52.7,46.6 39.8,23.5 53.9,0 26.9,0 16,14 5.9,0Z"/></g>
                <g transform="matrix(1.25,0,0,1.25,35.2,0)"><path d="M0,23.4 13.2,0 26.9,23.4 17.4,35.9 8.4,23.4Z"/></g>
              </g>
            </svg>
            <div class="card-logo-text">הבית <span>הצהוב</span></div>
          </div>
          <div></div>
        </div>

        <!-- MID -->
        <div class="card-mid">
          <div class="card-member-label">שם החבר</div>
          <div class="card-member-name" id="cardName">ישראל ישראלי</div>
        </div>

        <!-- BOTTOM -->
        <div class="card-bottom">
          <div class="card-fields">
            <div class="card-field">
              <div class="card-field-label">מספר חבר</div>
              <div class="card-field-value yellow" id="cardNumber">#00142</div>
            </div>
            <div class="card-field">
              <div class="card-field-label">תאריך הצטרפות</div>
              <div class="card-field-value" id="cardDate">06/25</div>
            </div>
            <div class="card-field" id="gateField">
              <div class="card-field-label">שער</div>
              <div class="card-field-value" id="cardGate">8</div>
            </div>
          </div>
          <div class="card-chip"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── SAVE BUTTON ── -->
  <button class="save-btn" onclick="saveCard()">
    💾 שמור תעודה לגלריה
  </button>

  <p class="card-footer-note">הצג תעודה זו בחנויות המשתתפות לקבלת הטבות</p>

  <script>
    // ── לדוגמה: נתוני חבר (בהמשך יגיעו מ-Firebase) ──
    const member = {
      firstName:  'ישראל',
      lastName:   'ישראלי',
      memberId:   142,
      joinedDate: new Date('2025-06-01'),
      gate:       '8',
      isSubscriber: true
    };

    function pad(n){ return String(n).padStart(5,'0'); }

    // מלא נתונים
    document.getElementById('cardName').textContent    = member.firstName + ' ' + member.lastName;
    document.getElementById('cardNumber').textContent  = '#' + pad(member.memberId);
    document.getElementById('cardDate').textContent    =
      String(member.joinedDate.getMonth()+1).padStart(2,'0') + '/' +
      String(member.joinedDate.getFullYear()).slice(2);
    document.getElementById('infoDate').textContent    =
      member.joinedDate.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});

    if (member.isSubscriber && member.gate) {
      document.getElementById('cardGate').textContent = member.gate;
      document.getElementById('gateField').style.display = 'block';
      document.querySelector('.info-box .family-tag').textContent = 'מנוי שער ' + member.gate;
    } else {
      document.getElementById('gateField').style.display = 'none';
      document.querySelector('.info-box .family-tag').textContent = 'אוהד';
    }

    // ── שמירה לגלריה ──
    async function saveCard() {
      try {
        const card = document.getElementById('memberCard');

        // נסה html2canvas אם זמין, אחרת הודעה
        if (typeof html2canvas !== 'undefined') {
          const canvas = await html2canvas(card, { scale: 3, backgroundColor: null });
          const link = document.createElement('a');
          link.download = 'תעודת-חבר-הבית-הצהוב.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        } else {
          alert('לשמירה לגלריה — לחץ לחיצה ארוכה על התעודה ובחר "שמור תמונה"');
        }
      } catch(e) {
        alert('לשמירה לגלריה — לחץ לחיצה ארוכה על התעודה ובחר "שמור תמונה"');
      }
    }

    // ── טעינת html2canvas לשמירת תמונה ──
    const s = document.createElement('script');
    s.src = 'https://html2canvas.hertzen.com/dist/html2canvas.min.js';
    document.head.appendChild(s);
  </script>

<!-- DEV ONLY – למחיקה לפני העלאה -->
<div id="_devBar" style="position:fixed;top:12px;left:8px;z-index:9999;display:flex;flex-direction:column;gap:6px;">
  <a href="/" style="background:#002a75;color:#FFD700;border:1.5px solid #FFD700;border-radius:20px;padding:6px 12px;font-family:'Heebo',sans-serif;font-size:11px;font-weight:700;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.3);white-space:nowrap;">← תפריט</a>
</div>
<div id="_tasksPanel" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.6);align-items:flex-end;justify-content:center;" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:#002a75;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:80dvh;overflow-y:auto;padding:24px 20px 40px;border-top:3px solid #FFD700;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <div style="color:#FFD700;font-size:17px;font-weight:900;font-family:'Heebo',sans-serif;">📋 משימות ורעיונות</div>
      <button onclick="document.getElementById('_tasksPanel').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:22px;cursor:pointer;">✕</button>
    </div>
    <div style="color:#FFD700;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:10px;">⚠️ למחיקה לפני העלאה</div>
    <div style="background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:10px;padding:10px 12px;font-size:12px;color:rgba(255,215,0,.8);font-family:'Heebo',sans-serif;line-height:1.6;margin-bottom:6px;">🗑️ כפתורי תפריט ומשימות — בכל הדפים</div>
    <div style="background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:10px;padding:10px 12px;font-size:12px;color:rgba(255,215,0,.8);font-family:'Heebo',sans-serif;line-height:1.6;margin-bottom:16px;">🗑️ דף nav.html — כולו</div>
    <div style="color:#FFD700;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:10px;">📌 רעיונות לפיתוח</div>
    <div id="_tasksList"></div>
  </div>
</div>
<script>
(function(){
  var tasks=[
    {t:'רישום בני משפחה',d:'עד 2 בני משפחה תחת אותו חשבון'},
    {t:'שליחת מייל אוטומטית (EmailJS)',d:'מייל נשלח בעת אישור. חינמי עד 200/חודש'},
    {t:'Firebase Storage לתמונות',d:'שמירת לוגו ותמונות עסקים. חינמי עד 5GB'},
    {t:'עיצוב תעודה — רקע בלומפילד',d:'תמונת יציע אוהדים כרקע. קובץ stadium.jpg'},
    {t:'הוספה לארנק (Wallet)',d:'Apple/Google Wallet. לשלב מאוחר'}
  ];
  var saved=JSON.parse(localStorage.getItem('_hbTasks')||'{}');
  var el=document.getElementById('_tasksList');
  el.innerHTML=tasks.map(function(t,i){
    var done=saved[i];
    return '<div onclick="hbToggle('+i+')" id="_t'+i+'" style="background:rgba(255,255,255,'+(done?'.03':'.07')+');border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;font-family:\'Heebo\',sans-serif;'+(done?'opacity:.4':'')+'"><div style="width:18px;height:18px;border-radius:5px;border:2px solid rgba(255,215,0,.4);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;background:'+(done?'#FFD700':'none')+';color:#002a75;">'+(done?'✓':'')+'</div><div><div style="font-size:13px;font-weight:700;color:#fff;'+(done?'text-decoration:line-through':'')+'">'+t.t+'</div><div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;">'+t.d+'</div></div></div>';
  }).join('');
  window.hbToggle=function(i){
    saved[i]=!saved[i];
    localStorage.setItem('_hbTasks',JSON.stringify(saved));
    var done=saved[i];
    var el2=document.getElementById('_t'+i);
    el2.style.opacity=done?'.4':'1';
    el2.querySelector('div').style.background=done?'#FFD700':'none';
    el2.querySelector('div').textContent=done?'✓':'';
    el2.querySelectorAll('div')[1].querySelector('div').style.textDecoration=done?'line-through':'none';
  };
})();
</script>
</body>
</html>
